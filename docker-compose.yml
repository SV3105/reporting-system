# ============================================================
#  Dockerized Kafka + Zookeeper + Solr + Kafka UI + PHP + React
#  Run:  docker-compose up -d
#  Stop: docker-compose down -v
# ============================================================

services:

  # ----------------------------------------------------------
  # 1. ZOOKEEPER
  #    KAFKA_OPTS whitelists 'srvr' for the health check below
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      # Uses bash /dev/tcp — no nc/curl needed. 'srvr' is whitelisted above.
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/2181 && printf 'srvr' >&3 && cat <&3 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  # ----------------------------------------------------------
  # 2. KAFKA BROKER
  #    Port 9092  → container-to-container (inside Docker)
  #    Port 29092 → host machine access (PHP scripts on host)
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS:            PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # 3. KAFKA TOPIC INITIALIZER  (runs once, then exits cleanly)
  # ----------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo 'Kafka is healthy — creating topics...'

        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic report_data_topic \
          --partitions 4 --replication-factor 1 \
          --config retention.ms=604800000 --config cleanup.policy=delete

        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic kafka-solr-csvdata \
          --partitions 4 --replication-factor 1

        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic report_data_dlq \
          --partitions 1 --replication-factor 1

        # Alter existing topics if they already exist with fewer partitions
        kafka-topics --bootstrap-server kafka:9092 --alter --topic report_data_topic --partitions 4 2>/dev/null || true
        kafka-topics --bootstrap-server kafka:9092 --alter --topic kafka-solr-csvdata --partitions 4 2>/dev/null || true

        echo 'Done. Topics:'
        kafka-topics --bootstrap-server kafka:9092 --describe

  # ----------------------------------------------------------
  # 4. APACHE SOLR  (http://localhost:8983)
  # ----------------------------------------------------------
  solr:
    image: solr:9
    container_name: solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
    command:
      - solr-precreate
      - csvcore

  # ----------------------------------------------------------
  # 5. KAFKA UI  (http://localhost:8080)
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ----------------------------------------------------------
  # 6. PHP API BACKEND  (http://localhost:8000)
  # ----------------------------------------------------------
  php-api:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: php-api
    restart: unless-stopped
    ports:
      - "8000:80"
      - "8082:8082"
    volumes:
      - ./php:/var/www/html
    depends_on:
      kafka:
        condition: service_healthy
      solr:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      TZ: Asia/Kolkata
      KAFKA_BROKER: kafka:9092
      SOLR_URL: http://solr:8983/solr/csvcore
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: reporting_system
      DB_USER: user
      DB_PASS: password
      SMTP_HOST: mailhog
      SMTP_PORT: 1025

  # ----------------------------------------------------------
  # 7. POSTGRESQL DATABASE
  # ----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: reporting-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reporting_system
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d reporting_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # 8. REACT FRONTEND  (http://localhost:3000)
  # ----------------------------------------------------------
  react-frontend:
    image: node:20-alpine
    container_name: react-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - php-api
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install -g npm@latest && npm install && npx vite --host 0.0.0.0 --port 5173 --strictPort"

  # ----------------------------------------------------------
  # 9. MAILHOG (Email Testing)
  # ----------------------------------------------------------
  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

# ============================================================
#  VOLUMES
# ============================================================
volumes:
  kafka_data:
  zk_data:
  zk_log:
  solr_data:
  pg_data:

# ============================================================
#  NETWORK
# ============================================================
networks:
  default:
    name: kafka-solr-net
    driver: bridge